apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: model-canary
  namespace: model-canary
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: canary.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: model-canary
                port:
                  name: http
  tls:
    - hosts:
        - canary.example.com
      secretName: model-canary-tls
