name: Feature Request
description: Suggest a feature for Model Canary
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What alternatives have you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - API
        - Dashboard
        - Providers
        - Evaluators
        - Drift Detection
        - Alerting
        - Storage
        - Documentation
        - Other
